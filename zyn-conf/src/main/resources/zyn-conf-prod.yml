# ──────────────────────────────────────────────────────────────
# 生产环境（Docker/K8s 内部通信）
# ──────────────────────────────────────────────────────────────

# SpringDoc（生产环境关闭）
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# Actuator（生产环境关闭全部端点，仅保留 health 且不显示详情）
management:
  endpoints:
    enabled-by-default: false
  endpoint:
    health:
      enabled: true
      show-details: never

spring:
  datasource:
    dynamic:
      datasource:
        master:
          url: jdbc:postgresql://${DB_HOST:192.168.1.3}:5432/zyn_base
          username: postgres
          password: ${POSTGRES_PASSWORD:Zyn@secure#99}
          driver-class-name: org.postgresql.Driver
      hikari:
        maximum-pool-size: 20
        minimum-idle: 5
        idle-timeout: 300000
        max-lifetime: 1200000
        connection-timeout: 10000
  data:
    redis:
      host: ${REDIS_HOST:192.168.1.3}
      port: 6379
      password: ${REDIS_PASSWORD:Zyn@secure#99}
      database: 0
    elasticsearch:
      uris: http://${ES_HOST:192.168.1.3}:9200
      username: elastic
      password: ${ELASTIC_PASSWORD:Zyn@secure#99}
  kafka:
    bootstrap-servers: ${KAFKA_HOST:192.168.1.3}:9092
    producer:
      acks: all
      retries: 3
      enable-idempotence: true
      compression-type: snappy
    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: false
    listener:
      ack-mode: manual

zyn:
  exchange:
    services:
      sys: http://${SYS_HOST:192.168.1.3}:28081
      netty: http://${NETTY_HOST:192.168.1.3}:28082
  storage:
    s3:
      endpoint: http://${S3_HOST:192.168.1.3}:8333
