name: zyn

# ----------------------------------------------------------
# 共享配置
# ----------------------------------------------------------
x-common: &common
  restart: unless-stopped
  networks: [zyn-net]
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "3"

# ----------------------------------------------------------
# 网络
# ----------------------------------------------------------
networks:
  zyn-net:
    name: zyn_net
    driver: bridge

services:

  # --- 数据库 ------------------------------------------------

  postgres:
    <<: *common
    container_name: postgres
    image: ${POSTGRES_IMAGE}
    environment:
      POSTGRES_DB: zyn_base
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Shanghai
      LANG: C.UTF-8
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c work_mem=8MB
        -c maintenance_work_mem=256MB
        -c max_connections=200
        -c random_page_cost=1.1
        -c log_min_duration_statement=500
        -c logging_collector=on
        -c log_directory=/var/log/postgresql
        -c log_filename=postgresql-%Y-%m-%d.log
        -c max_parallel_workers_per_gather=4
        -c max_parallel_workers=8
        -c max_worker_processes=16
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c default_statistics_target=100
        -c timezone=Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
      - ./postgres/logs:/var/log/postgresql
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
    shm_size: 256m
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=${POSTGRES_PASSWORD} pg_isready -U postgres -d zyn_base"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # --- 缓存 --------------------------------------------------

  redis:
    <<: *common
    container_name: redis
    image: redis:7.4-alpine
    environment:
      TZ: Asia/Shanghai
      LANG: C.UTF-8
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --tcp-backlog 511
        --timeout 300
        --tcp-keepalive 60
        --appendonly yes
        --appendfsync everysec
        --lazyfree-lazy-eviction yes
        --lazyfree-lazy-expire yes
        --io-threads 4
        --io-threads-do-reads yes
        --logfile /var/log/redis/redis.log
    ports:
      - "6379:6379"
    volumes:
      - ./redis/data:/data
      - ./redis/logs:/var/log/redis
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- 消息队列 ----------------------------------------------

  kafka:
    <<: *common
    container_name: kafka
    image: apache/kafka:3.7.1
    environment:
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      # 日志保留策略
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824
      KAFKA_LOG_SEGMENT_BYTES: 104857600
      KAFKA_LOG_CLEANUP_POLICY: delete
      # 网络与线程
      KAFKA_NUM_NETWORK_THREADS: 4
      KAFKA_NUM_IO_THREADS: 8
      KAFKA_SOCKET_SEND_BUFFER_BYTES: 102400
      KAFKA_SOCKET_RECEIVE_BUFFER_BYTES: 102400
      KAFKA_SOCKET_REQUEST_MAX_BYTES: 104857600
      # 分区与副本
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # JVM + 时区
      KAFKA_HEAP_OPTS: -Xms1g -Xmx1g
      TZ: Asia/Shanghai
      LANG: C.UTF-8
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Shanghai -Dfile.encoding=UTF-8
    ports:
      - "9092:9092"
    volumes:
      - ./kafka/data:/var/lib/kafka/data
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # --- 搜索引擎 ----------------------------------------------

  elasticsearch:
    <<: *common
    container_name: elasticsearch
    build: ./elasticsearch
    image: zyn-elasticsearch:8.15.3
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - ES_JAVA_OPTS=-Xms1g -Xmx1g -Duser.timezone=Asia/Shanghai -Dfile.encoding=UTF-8
      - TZ=Asia/Shanghai
      - LANG=C.UTF-8
      - bootstrap.memory_lock=true
      - cluster.routing.allocation.disk.threshold_enabled=true
      - cluster.routing.allocation.disk.watermark.low=85%
      - cluster.routing.allocation.disk.watermark.high=90%
      - thread_pool.write.queue_size=1000
      - thread_pool.search.queue_size=1000
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
    volumes:
      - ./elasticsearch/data:/usr/share/elasticsearch/data
      - ./elasticsearch/logs:/usr/share/elasticsearch/logs
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # --- 对象存储 ----------------------------------------------

  seaweedfs-master:
    <<: *common
    container_name: seaweedfs-master
    image: chrislusf/seaweedfs:4.29
    environment:
      TZ: Asia/Shanghai
      LANG: C.UTF-8
    command: master
      -port=9333
      -volumeSizeLimitMB=30000
      -volumePreallocate=false
      -garbageThreshold=0.3
    ports:
      - "9333:9333"
    volumes:
      - ./seaweedfs/master/data:/data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:9333/cluster/status || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  seaweedfs-volume:
    <<: *common
    container_name: seaweedfs-volume
    image: chrislusf/seaweedfs:4.29
    environment:
      TZ: Asia/Shanghai
      LANG: C.UTF-8
    command: volume
      -port=8080
      -ip.bind=0.0.0.0
      -mserver=seaweedfs-master:9333
      -dir=/data
      -max=10
      -disk=hdd
      -fileSizeLimitMB=256
      -index=leveldb
    ports:
      - "8080:8080"
    volumes:
      - ./seaweedfs/volume/data:/data
    depends_on:
      seaweedfs-master:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/status || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  seaweedfs-filer:
    <<: *common
    container_name: seaweedfs-filer
    image: chrislusf/seaweedfs:4.29
    environment:
      TZ: Asia/Shanghai
      LANG: C.UTF-8
    command: filer
      -port=8888
      -ip.bind=0.0.0.0
      -master=seaweedfs-master:9333
    ports:
      - "8888:8888"
    volumes:
      - ./seaweedfs/filer/data:/data
    depends_on:
      seaweedfs-master:
        condition: service_healthy
      seaweedfs-volume:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8888/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  seaweedfs-s3:
    <<: *common
    container_name: seaweedfs-s3
    image: chrislusf/seaweedfs:4.29
    environment:
      TZ: Asia/Shanghai
      LANG: C.UTF-8
    command: s3
      -filer=seaweedfs-filer:8888
      -port=8333
      -config=/etc/seaweedfs/s3.conf
    ports:
      - "8333:8333"
    volumes:
      - ./seaweedfs/s3.conf:/etc/seaweedfs/s3.conf:ro
    depends_on:
      seaweedfs-filer:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8333 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  seaweedfs-init:
    image: amazon/aws-cli:2.17.0
    restart: "no"
    entrypoint: /bin/sh
    command: >
      -c "
        aws --endpoint-url http://seaweedfs-s3:8333 s3 mb s3://${S3_BUCKET} || true;
        echo 'Bucket ${S3_BUCKET} ready.';
      "
    environment:
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY}
      AWS_DEFAULT_REGION: cn-north-1
      TZ: Asia/Shanghai
      LANG: C.UTF-8
    depends_on:
      seaweedfs-s3:
        condition: service_healthy
    networks:
      - zyn-net

  # --- 注册/配置中心 ---------------------------------------------

  nacos:
    <<: *common
    container_name: nacos
    image: nacos/nacos-server:v2.4.3
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: ""
      JVM_XMS: 512m
      JVM_XMX: 512m
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_TOKEN: JQKlwTrnQwezRyDrc3hWw8eVmhDsq9067TRDCvnHk4vUEU1CPmPyrOInhl4jUq
      NACOS_AUTH_IDENTITY_KEY: zyn
      NACOS_AUTH_IDENTITY_VALUE: Zyn@secure#99
      NACOS_ADMIN_PASSWORD: Zyn@secure#99
      TZ: Asia/Shanghai
      LANG: C.UTF-8
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    volumes:
      - ./nacos/data:/home/nacos/data
      - ./nacos/logs:/home/nacos/logs
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8848/nacos/v1/console/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --- 管理平台 ----------------------------------------------

  infini-console:
    <<: *common
    container_name: infini-console
    image: infinilabs/console:1.30.2-2396
    ports:
      - "9000:9000"
    volumes:
      - ./infini-console/config:/config
      - ./infini-console/data:/data
      - ./infini-console/logs:/log
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:9000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
