# ============================================================
# Nginx 瓦片缓存配置
# 放在 nginx.conf 的 http {} 块内
# ============================================================

# 瓦片缓存区域（磁盘缓存，10GB）
proxy_cache_path /var/cache/nginx/tiles
    levels=1:2
    max_size=10g
    inactive=7d
    use_temp_path=off;

server {
    listen 80;
    server_name localhost;

    # ── 栅格瓦片代理 ─────────────────────────────

    location /api/v1/map/tile/ {
        proxy_pass http://127.0.0.1:28082;

        # 磁盘缓存
        proxy_cache tiles;
        proxy_cache_key $uri;
        proxy_cache_valid 200 5m;
        proxy_cache_valid 204 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
        proxy_cache_background_update on;
        proxy_cache_lock on;

        # 浏览器缓存
        add_header Cache-Control "public, max-age=300";
        add_header X-Cache-Status $upstream_cache_status;
    }

    # ── 矢量瓦片（MVT）代理 ────────────────────────

    location /api/v1/map/mvt/ {
        proxy_pass http://127.0.0.1:28082;

        # 磁盘缓存
        proxy_cache tiles;
        proxy_cache_key $uri;
        proxy_cache_valid 200 2m;
        proxy_cache_valid 204 30s;
        proxy_cache_use_stale error timeout updating;
        proxy_cache_background_update on;
        proxy_cache_lock on;

        # ETag 透传（支持 304）
        proxy_pass_header ETag;
        proxy_set_header If-None-Match $http_if_none_match;

        add_header Cache-Control "public, max-age=120";
        add_header X-Cache-Status $upstream_cache_status;
    }

    # ── 瓦片缓存失效 ──────────────────────────────

    location /api/v1/map/mvt/ {
        # PURGE 方法清除指定瓦片缓存（需 ngx_cache_purge 模块）
        # 或通过应用层 /invalidate 端点清 Redis，Nginx 通过 ETag 自然过期
    }

    # ── 其他 API 代理 ─────────────────────────────

    location /api/v1/map/ {
        proxy_pass http://127.0.0.1:28082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
